<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>💖 Visual Novel Date Ultimate</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(-45deg,#ffb6c1,#ff69b4,#ffc0cb,#ff85c0);
background-size:400% 400%;
animation:bg 8s infinite;
overflow:hidden;
text-align:center;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.step{display:none;padding-top:60px;}

button{
padding:15px 25px;
border:none;
border-radius:25px;
font-size:18px;
cursor:pointer;
margin:10px;
}

#yes{
background:white;
color:hotpink;
}

#no{
background:black;
color:white;
position:absolute;
}

select,input{
padding:10px;
border-radius:10px;
border:none;
margin:10px;
}

img{
width:180px;
border-radius:20px;
box-shadow:0 0 20px rgba(255,255,255,0.5);
}

.heart{
position:fixed;
top:-20px;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh);
opacity:0;
}
}

.dashboard-link {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 12px 20px;
  border-radius: 25px;
  text-decoration: none;
  font-size: 14px;
  z-index: 999;
  transition: all 0.3s ease;
}

.dashboard-link:hover {
  background: rgba(0,0,0,0.9);
  transform: scale(1.05);
}
</style>
</head>

<body>

<!-- 📊 LIEN VERS LE DASHBOARD -->
<a href="dashboard.html" class="dashboard-link" target="_blank" title="Voir les statistiques">📊 Dashboard</a>

<!-- 🎵 MUSIQUE DE FOND (LOCALE) -->
<audio id="bgMusic" loop preload="auto">
    <source src="hasenchat-love-on-lock-430697.mp3" type="audio/mpeg">
</audio>

<!-- 🔊 SON CLIC -->
<audio id="clickSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_4b4b8c8c3a.mp3?filename=click-124467.mp3">
</audio>

<!-- STEP 1 -->
<div id="step1" class="step" style="display:block">
<h1>💖 Bienvenue Abigail</h1>

<img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif">

<p>Les compos sont finies 😌</p>
<p>On peut enfin se détendre...</p>

<p>Veux-tu continuer ?</p>

<button onclick="playYes();trackClick('Oui - Bienvenue');step2()">Oui 💖</button>
<button onmouseover="playSwoosh();runAway()" id="s1-no">Non 😏</button>
</div>

<!-- STEP 2 -->
<div id="step2" class="step">
<h1 id="text"></h1>

<img src="https://media.giphy.com/media/fxsqOYnIMEefC/giphy.gif">

<p>Veux-tu passer un moment avec moi ? 💕</p>

<button onclick="playYes();trackClick('Ça marche - Sortie');step3()">ça marche 💖</button>
<button onmouseover="playSwoosh();runAway()" id="s2-no">je reste chez moi 😅</button>
</div>

<!-- STEP 3 -->
<div id="step3" class="step">
<h2>Choisis le lieu de la sortie 💖</h2>

<img src="https://media.giphy.com/media/OkJat1YNdoD3W/giphy.gif">

<select id="locSelect">
<option>Restaurant 🍽️</option>
<option>Piscine 🏊</option>
<option>Chez moi 🏠</option>
<option>Chez elle 💕</option>
<option>Glace 🍦</option>
<option>Zoo 🐯</option>
<option>Cinéma 🎬</option>
<option>Bar 🍹</option>
<option>Massage spécial 💆‍♀️</option>
<option>Footing spécial 🏃‍♀️💖</option>
<option>Cuisine du chef 👨‍🍳🔥</option>
<option>Autre ✍️</option>
</select>

<br>

<input id="locOther" placeholder="Autre lieu">
<br>
<input type="time" id="timeInput">

<br>

<button onclick="playYes();trackClick('Valider - Choix');step4()">Valider 💖</button>
</div>

<!-- STEP 4 -->
<div id="step4" class="step">
<h1>💖 J'ai hâte de te revoir</h1>

<img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">

<p>Rappelle-toi : je t'ai pas forcée 😄</p>
<p>Ta sortie est confirmée 💌</p>
</div>

<script src="tracker.js"></script>

<script>
let audioCtx = null;
let soundEnabled = true;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    document.addEventListener('pointerdown', () => {
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }, { once: true });
  }
  return audioCtx;
}

function playClickSynth() {
  const ctx = getAudioCtx();
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.type = 'square';
  o.frequency.value = 1000;
  o.connect(g);
  g.connect(ctx.destination);

  const now = ctx.currentTime;
  g.gain.setValueAtTime(0.001, now);
  g.gain.exponentialRampToValueAtTime(0.12, now + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);

  o.start(now);
  o.stop(now + 0.14);
}

function playClickFallback(){
  const el = document.getElementById("clickSound");
  if(el){ el.currentTime=0; el.play().catch(()=>{}); }
}

function playYes(){
  playClickSynth();
  playClickFallback();
}

function playSwoosh(){
  playClickFallback();
}

// Lancer la musique au chargement du site
window.addEventListener('load', function() {
  const bg = document.getElementById("bgMusic");
  if(bg){
    bg.volume = 0.35;
    bg.play().catch(()=>{});
  }
});

// Aussi au premier clic (pour la compatibilité navigateur)
document.addEventListener("click", () => {
  const bg = document.getElementById("bgMusic");
  if(bg && bg.paused){
    bg.volume = 0.35;
    bg.play().catch(()=>{});
  }
},{once:true});

function runAway(e){
  const btn = event.target;
  btn.style.position="absolute";
  btn.style.top=Math.random()*70+"vh";
  btn.style.left=Math.random()*70+"vw";
}

// 📊 FONCTION DE SUIVI DES CLICS
function trackClick(linkName) {
  // Attendre que le tracker soit chargé
  if (typeof tracker !== 'undefined') {
    tracker.trackClick(linkName);
  } else {
    // Retry après 100ms si tracker n'est pas prêt
    setTimeout(() => trackClick(linkName), 100);
  }
}

function step2(){
document.getElementById("step1").style.display="none";
document.getElementById("step2").style.display="block";

let text="Merciiii Abigail 💖 je t'ai pas forcée hein haha 😄";
let i=0;
document.getElementById("text").innerHTML="";

let interval=setInterval(()=>{
document.getElementById("text").innerHTML+=text[i];
i++;
if(i>=text.length) clearInterval(interval);
},50);
}

let heartInterval=null;

function step3(){
document.getElementById("step2").style.display="none";
document.getElementById("step3").style.display="block";

heartInterval=setInterval(()=>{
let h=document.createElement("div");
h.innerHTML="❤️";
h.className="heart";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
},200);
}

function step4(){
const loc=document.getElementById("locSelect").value;
const other=document.getElementById("locOther").value.trim();
const time=document.getElementById("timeInput").value;
const chosen=other?other:loc;

// 📊 ENREGISTRER LA RÉPONSE
if (typeof tracker !== 'undefined') {
  tracker.trackResponse('step4', {
    location: chosen,
    time: time
  });
}

document.getElementById("step3").style.display="none";
document.getElementById("step4").style.display="block";

for(let i=0;i<60;i++){
let c=document.createElement("div");
c.innerHTML="💖";
c.style.position="fixed";
c.style.left=Math.random()*100+"vw";
c.style.top="-20px";
document.body.appendChild(c);

let fall=setInterval(()=>{
c.style.top=(c.offsetTop+5)+"px";
if(c.offsetTop>window.innerHeight){
c.remove();
clearInterval(fall);
}
},20);
}

console.log("Choix:",chosen,time);
}
</script>

</body>
</html>
